<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的旅行纪念相册</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* 基础重置 */
  body { margin: 0; background: #f0f0f0; font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; -webkit-tap-highlight-color: transparent; }
  .app-container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); overflow-x: hidden; padding-bottom: 80px; }
  
  /* --- 全局组件 --- */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; transform: translate(-50%, -20px); }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  
  /* --- 朋友圈头部 --- */
  .cover { height: 320px; background-color: #ddd; background-position: center; background-size: cover; position: relative; }
  .edit-cover-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.4); color: white; padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(4px); transition: background 0.2s; }
  .edit-cover-btn:active { background: rgba(0,0,0,0.6); }
  .profile-wrap { position: absolute; right: 20px; bottom: -25px; display: flex; align-items: flex-end; cursor: pointer; }
  .name-wrap { display: flex; align-items: center; margin-bottom: 35px; margin-right: 20px; }
  .profile-name { color: white; font-size: 20px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  .profile-avatar { width: 75px; height: 75px; border-radius: 10px; background: #fff; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  
  /* --- 信息流 --- */
  .feed { padding: 45px 15px 20px; }
  .post { display: flex; margin-bottom: 30px; border-bottom: 1px solid #f5f5f5; padding-bottom: 20px; }
  .avatar { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; flex-shrink: 0; object-fit: cover; }
  .post-body { flex: 1; overflow: hidden; }
  .author-name { color: #576b95; font-size: 16px; font-weight: 600; margin-bottom: 5px; }
  .post-text { font-size: 16px; color: #1a1a1a; margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
  .img-grid { display: grid; gap: 5px; margin-bottom: 12px; }
  .img-grid.grid-1 { grid-template-columns: minmax(150px, 60%); }
  .img-grid.grid-4 { grid-template-columns: repeat(2, 100px); }
  .img-grid.grid-9 { grid-template-columns: repeat(3, 90px); }
  .img-grid img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 2px; }
  .location-tag { color: #576b95; margin-bottom: 5px; font-size: 13px; }
  .meta-info { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #b2b2b2; margin-top: 10px;}
  .edit-btn { background: #f0f0f0; border: none; color: #576b95; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;}
  .fab-btn { position: fixed; bottom: 30px; right: 50%; transform: translateX(210px); width: 56px; height: 56px; background: #07c160; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(7,193,96,0.4); cursor: pointer; z-index: 100; transition: transform 0.2s;}
  .fab-btn:active { transform: translateX(210px) scale(0.9); }
  @media (max-width: 500px) { .fab-btn { right: 20px; transform: none; } .fab-btn:active { transform: scale(0.9); } }
  
  /* --- 弹窗 --- */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
  .modal-overlay.active { display: flex; }
  .modal-box { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 12px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
  
  /* 修改资料样式 */
  .avatar-edit-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
  .avatar-edit-label { position: relative; cursor: pointer; }
  .avatar-edit-label img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .avatar-edit-icon { position: absolute; bottom: -8px; right: -8px; background: #07c160; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; border: 2px solid white; }
  
  /* 表单通用 */
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; font-weight: 500; }
  .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #f9f9f9; outline: none; }
  .ai-btn { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; border: none; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .image-upload-area { display: flex; flex-wrap: wrap; gap: 10px; }
  .preview-img-box { width: 70px; height: 70px; position: relative; border-radius: 6px; overflow: hidden; }
  .preview-img-box img { width: 100%; height: 100%; object-fit: cover; }
  .add-img-btn { width: 70px; height: 70px; background: #f5f5f5; border: 1px dashed #ccc; border-radius: 6px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 24px; color: #999; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; }
  .modal-actions button { padding: 10px 24px; border: none; border-radius: 20px; cursor: pointer; font-size: 15px; font-weight: 500; }
  .btn-cancel { background: #f0f0f0; color: #333; }
  .btn-save { background: #07c160; color: white; }
</style>
</head>
<body>

<div class="app-container">
  <div id="toast" class="toast"></div>

  <!-- 头部封面 -->
  <div class="cover" id="display-cover">
    <label class="edit-cover-btn">
      <i class="fa-solid fa-camera"></i> 换封面
      <input type="file" accept="image/*" style="display: none;" onchange="updateCover(event)">
    </label>
    <div class="profile-wrap" onclick="openProfileModal()">
      <div class="name-wrap">
        <div class="profile-name" id="display-name">用户名</div>
      </div>
      <img class="profile-avatar" id="display-avatar" src="" alt="Avatar">
    </div>
  </div>

  <!-- 动态列表 -->
  <div class="feed" id="feed-container"></div>
  
  <!-- 悬浮发布按钮 -->
  <div class="fab-btn" onclick="openPostModal('create')"><i class="fa-solid fa-plus"></i></div>

  <!-- ================= 弹窗区域 ================= -->
  
  <!-- 修改个人资料弹窗 -->
  <div class="modal-overlay" id="profile-modal">
    <div class="modal-box">
      <h3 style="margin-top: 0; text-align: center; color: #333;">编辑个人资料</h3>
      
      <div class="avatar-edit-wrap">
        <label class="avatar-edit-label">
          <img id="edit-avatar-preview" src="">
          <div class="avatar-edit-icon"><i class="fa-solid fa-camera"></i></div>
          <input type="file" accept="image/*" style="display: none;" onchange="handleEditAvatar(event)">
        </label>
        <div style="font-size: 12px; color: #999; margin-top: 8px;">点击更换头像</div>
      </div>

      <div class="form-group">
        <input type="text" id="edit-name-input" placeholder="输入你的专属昵称" style="text-align: center;">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeProfileModal()">取消</button>
        <button class="btn-save" onclick="saveProfile()">保存修改</button>
      </div>
    </div>
  </div>

  <!-- 发布/修改动态弹窗 -->
  <div class="modal-overlay" id="post-modal">
    <div class="modal-box">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 id="modal-title" style="margin: 0; color: #333;">发布动态</h3>
        <button class="ai-btn" onclick="generateAICaption()">AI 帮写文案 ✨</button>
      </div>
      <input type="hidden" id="post-id"><input type="hidden" id="post-mode">
      
      <div class="form-group">
        <textarea id="post-text" placeholder="这一刻的想法..." style="height: 100px; resize: none;"></textarea>
      </div>
      
      <div class="image-upload-area" id="image-preview-area">
        <label class="add-img-btn" id="add-img-btn-label">
          <i class="fa-solid fa-plus"></i>
          <input type="file" accept="image/*" multiple style="display: none;" onchange="handlePostImages(event)">
        </label>
      </div>
      
      <div class="form-group" style="margin-top: 15px;">
        <input type="text" id="post-location" placeholder="🌍 所在位置 (例如: 巴黎铁塔)">
      </div>
      
      <div class="form-group">
        <input type="datetime-local" id="post-time">
      </div>
      
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closePostModal()">取消</button>
        <button class="btn-save" onclick="savePost()">发布</button>
      </div>
    </div>
  </div>

</div>

<script>
// ================= 全局数据初始化 =================
// 如果没有本地数据，自动生成一个极简默认配置
let userProfile = JSON.parse(localStorage.getItem('travel_user')) || {
  name: "旅行漫游者",
  avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=MOS",
  cover: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&q=80"
};

// 预设一条初始欢迎动态
const defaultPosts = [{
  id: Date.now(),
  text: "这里是你的 MOS 旅行专属相册。🌍\n\n点击右下角的加号，开始记录你的第一条旅行回忆吧！所有的内容都可以随时修改，放肆排版！",
  location: "MOS 初始空间",
  time: new Date().toISOString().slice(0, 16),
  images: []
}];
let posts = JSON.parse(localStorage.getItem('travel_posts')) || defaultPosts;

// ================= 基础工具函数 =================
function showToast(m) { 
  const t = document.getElementById('toast'); 
  t.textContent = m; 
  t.classList.add('show'); 
  setTimeout(() => t.classList.remove('show'), 3000); 
}

// 图片本地压缩压缩
async function compressImage(file, maxWidth = 800) {
  return new Promise((resolve) => {
    const reader = new FileReader(); reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image(); img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
    };
  });
}

// ================= 页面渲染逻辑 =================
function init() {
  document.getElementById('display-name').textContent = userProfile.name;
  document.getElementById('display-avatar').src = userProfile.avatar;
  document.getElementById('display-cover').style.backgroundImage = `url('${userProfile.cover}')`;
  renderFeed();
}

function renderFeed() {
  const container = document.getElementById('feed-container'); 
  container.innerHTML = '';
  const sorted = [...posts].sort((a, b) => new Date(b.time) - new Date(a.time));
  
  sorted.forEach(post => {
    let grid = 'grid-9'; 
    if (post.images.length === 1) grid = 'grid-1'; 
    else if ([2, 4].includes(post.images.length)) grid = 'grid-4';
    
    container.innerHTML += `
      <div class="post">
        <img class="avatar" src="${userProfile.avatar}">
        <div class="post-body">
          <div class="author-name">${userProfile.name}</div>
          <div class="post-text">${post.text}</div>
          ${post.images.length > 0 ? `<div class="img-grid ${grid}">${post.images.map(img => `<img src="${img}">`).join('')}</div>` : ''}
          ${post.location ? `<div class="location-tag">${post.location}</div>` : ''}
          <div class="meta-info">
            <span>${new Date(post.time).toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
            <button class="edit-btn" onclick="openPostModal('edit', ${post.id})">修改</button>
          </div>
        </div>
      </div>`;
  });
}

// ================= 个人资料修改 =================
async function updateCover(e) { 
  if (!e.target.files[0]) return;
  userProfile.cover = await compressImage(e.target.files[0], 1200); 
  localStorage.setItem('travel_user', JSON.stringify(userProfile)); 
  init(); 
  showToast("封面更新成功");
}

let tempEditAvatar = "";
function openProfileModal() {
  document.getElementById('edit-name-input').value = userProfile.name;
  document.getElementById('edit-avatar-preview').src = userProfile.avatar;
  tempEditAvatar = userProfile.avatar;
  document.getElementById('profile-modal').classList.add('active');
}
function closeProfileModal() { 
  document.getElementById('profile-modal').classList.remove('active'); 
}

async function handleEditAvatar(e) {
  const file = e.target.files[0]; if (!file) return;
  tempEditAvatar = await compressImage(file, 400);
  document.getElementById('edit-avatar-preview').src = tempEditAvatar;
}

function saveProfile() {
  const newName = document.getElementById('edit-name-input').value.trim();
  userProfile.name = newName || "旅行漫游者";
  userProfile.avatar = tempEditAvatar;
  localStorage.setItem('travel_user', JSON.stringify(userProfile));
  closeProfileModal();
  init();
  showToast("资料已保存");
}

// ================= 动态发布与修改 =================
let currentPostImages = [];

async function handlePostImages(e) {
  for (let file of Array.from(e.target.files).slice(0, 9 - currentPostImages.length)) {
    currentPostImages.push(await compressImage(file, 1000));
  }
  renderPreviews();
}

function renderPreviews() {
  const area = document.getElementById('image-preview-area');
  area.querySelectorAll('.preview-img-box').forEach(el => el.remove());
  currentPostImages.forEach((img, i) => {
    const box = document.createElement('div'); box.className = 'preview-img-box';
    box.innerHTML = `
      <img src="${img}">
      <div style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;justify-content:center;align-items:center;cursor:pointer;" onclick="currentPostImages.splice(${i},1);renderPreviews();">
        <i class="fa-solid fa-xmark"></i>
      </div>`;
    area.insertBefore(box, document.getElementById('add-img-btn-label'));
  });
  
  // 达到9张图隐藏添加按钮
  document.getElementById('add-img-btn-label').style.display = currentPostImages.length >= 9 ? 'none' : 'flex';
}

function openPostModal(mode, id = null) {
  const m = document.getElementById('post-modal'); 
  m.classList.add('active');
  document.getElementById('post-mode').value = mode;
  document.getElementById('modal-title').textContent = mode === 'create' ? '发布新动态' : '修改动态';
  
  if (mode === 'create') {
    document.getElementById('post-id').value = ''; 
    document.getElementById('post-text').value = '';
    document.getElementById('post-location').value = ''; 
    document.getElementById('post-time').value = new Date().toISOString().slice(0, 16);
    currentPostImages = [];
  } else {
    const p = posts.find(x => x.id === id); 
    document.getElementById('post-id').value = p.id;
    document.getElementById('post-text').value = p.text; 
    document.getElementById('post-location').value = p.location;
    document.getElementById('post-time').value = p.time; 
    currentPostImages = [...p.images];
  }
  renderPreviews();
}

function closePostModal() { document.getElementById('post-modal').classList.remove('active'); }

function savePost() {
  const mode = document.getElementById('post-mode').value;
  const p = { 
    text: document.getElementById('post-text').value, 
    location: document.getElementById('post-location').value, 
    time: document.getElementById('post-time').value, 
    images: [...currentPostImages] 
  };
  
  if (mode === 'create') { 
    p.id = Date.now(); 
    posts.push(p); 
  } else { 
    const i = posts.findIndex(x => x.id == document.getElementById('post-id').value); 
    posts[i] = { ...posts[i], ...p }; 
  }
  
  localStorage.setItem('travel_posts', JSON.stringify(posts)); 
  renderFeed(); 
  closePostModal();
  showToast(mode === 'create' ? "发布成功" : "修改成功");
}

// AI 辅助文案生成
async function generateAICaption() {
  const btn = document.querySelector('.ai-btn'); 
  const oldText = btn.textContent;
  btn.disabled = true; btn.textContent = '思考中...';
  try {
    const apiKey = ""; // 这里后续可配置真实的 Gemini API Key
    const location = document.getElementById('post-location').value;
    const text = document.getElementById('post-text').value;
    const prompt = `请为我的旅行朋友圈写一段优美文艺的文案。地点：${location}，照片内容：${currentPostImages.length}张照片，我的初步想法：${text}。请带上合适的Emoji，不要太长。`;
    
    // 如果没有 Key，给一个模拟演示效果
    if(!apiKey) {
       setTimeout(() => {
         document.getElementById('post-text').value = `${location ? '在' + location + '，' : ''}风很温柔，云很轻。记录此刻的美好 📸✨\n\n（提示：如需真实 AI 生成，需在代码中配置 API Key）`;
         showToast("✨ AI 灵感已注入");
         btn.disabled = false; btn.textContent = oldText;
       }, 1000);
       return;
    }

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const res = await response.json();
    document.getElementById('post-text').value = res.candidates[0].content.parts[0].text;
    showToast("✨ AI 已完成创作");
  } catch (e) { 
    showToast("AI 助手连接失败"); 
  }
  btn.disabled = false; btn.textContent = oldText;
}

// 启动应用
window.onload = init;
</script>
</body>
</html>
