<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

<script>
  // 初始化拖拽排序
  function initSortable() {
    const area = document.getElementById('image-preview-area');
    new Sortable(area, {
      animation: 150,
      filter: '.add-img-btn', // 保证“加号”按钮永远在最后
      onEnd: () => {
        // 更新数组顺序
        const boxes = area.querySelectorAll('.preview-img-box');
        const newImages = [];
        boxes.forEach(box => {
          newImages.push(box.querySelector('img').src);
        });
        currentImages = newImages;
      }
    });
  }

  // 修改渲染 Feed 逻辑，加入地图链接
  // 在 renderFeed 函数中，将 location 渲染改为：
  // ${post.location ? `<div class="location-tag" onclick="window.open('https://uri.amap.com/search?keyword=${encodeURIComponent(post.location)}')">📍 ${post.location}</div>` : ''}
</script>
