<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOS - 我的空间</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* --- 基础与极简样式 --- */
  body { margin: 0; background: #f0f0f0; font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; -webkit-tap-highlight-color: transparent; }
  .app-container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
  
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 10000; opacity: 0; pointer-events: none; transition: all 0.3s; }
  .toast.show { opacity: 1; transform: translate(-50%, 10px); }
  
  /* --- 头部封面 --- */
  .cover { height: 320px; background-color: #ddd; background-position: center; background-size: cover; position: relative; }
  .edit-cover-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.4); color: white; padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(4px); }
  .profile-wrap { position: absolute; right: 20px; bottom: -25px; display: flex; align-items: flex-end; }
  .name-wrap { display: flex; align-items: center; margin-bottom: 35px; margin-right: 20px; cursor: pointer; }
  .profile-name { color: white; font-size: 20px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  .profile-avatar { width: 75px; height: 75px; border-radius: 10px; background: #fff; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; }
  
  /* --- 信息流 --- */
  .feed { padding: 45px 15px 20px; }
  .post { display: flex; margin-bottom: 30px; border-bottom: 1px solid #f5f5f5; padding-bottom: 20px; }
  .avatar { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; flex-shrink: 0; object-fit: cover; }
  .post-body { flex: 1; overflow: hidden; }
  .author-name { color: #576b95; font-size: 16px; font-weight: 600; margin-bottom: 5px; }
  .post-text { font-size: 16px; color: #1a1a1a; margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
  
  .img-grid { display: grid; gap: 5px; margin-bottom: 12px; }
  .img-grid.grid-1 { grid-template-columns: minmax(150px, 60%); }
  .img-grid.grid-4 { grid-template-columns: repeat(2, 100px); }
  .img-grid.grid-9 { grid-template-columns: repeat(3, 90px); }
  .img-grid img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 2px; }
  
  .location-tag { color: #576b95; margin-bottom: 5px; font-size: 13px; }
  .meta-info { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #b2b2b2; margin-top: 10px;}
  
  /* --- 按钮样式 (包含修改和删除) --- */
  .action-btns { display: flex; gap: 15px; }
  .action-btn { background: none; border: none; padding: 0; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-edit { color: #576b95; }
  .btn-delete { color: #ff4d4f; }
  
  .fab-btn { position: fixed; bottom: 30px; right: 50%; transform: translateX(210px); width: 56px; height: 56px; background: #07c160; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(7,193,96,0.4); cursor: pointer; z-index: 100; transition: transform 0.2s; }
  .fab-btn:active { transform: translateX(210px) scale(0.9); }
  
  /* --- 弹窗通用样式 --- */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(3px); }
  .modal-overlay.active { display: flex; }
  .modal-box { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 12px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
  .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #f9f9f9; outline: none; font-family: inherit; margin-bottom: 15px; }
  
  /* --- 图片上传区 --- */
  .image-upload-area { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
  .preview-img-box { width: 70px; height: 70px; position: relative; border-radius: 6px; overflow: hidden; }
  .preview-img-box img { width: 100%; height: 100%; object-fit: cover; }
  .remove-img { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.6); color: white; width: 20px; height: 20px; font-size: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
  .add-img-btn { width: 70px; height: 70px; background: #f5f5f5; border: 1px dashed #ccc; border-radius: 6px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 24px; color: #999; }
  
  .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
  .modal-actions button { padding: 10px 24px; border: none; border-radius: 20px; cursor: pointer; font-size: 15px; font-weight: 500; }
  .btn-cancel { background: #f0f0f0; color: #333; }
  .btn-save { background: #07c160; color: white; }
</style>
</head>
<body>

<div class="app-container">
  <div id="toast" class="toast"></div>

  <div class="cover" id="display-cover">
    <label class="edit-cover-btn">
      <i class="fa-solid fa-camera"></i> 换封面
      <input type="file" accept="image/*" style="display: none;" id="cover-upload">
    </label>
    <div class="profile-wrap">
      <div class="name-wrap" onclick="openProfileModal()">
        <div class="profile-name" id="display-name">Qinyi</div>
      </div>
      <img class="profile-avatar" id="display-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Qinyi" onclick="openProfileModal()">
    </div>
  </div>

  <div class="feed" id="feed-container">
    <div style="text-align: center; color: #999; margin-top: 50px;">正在连接云端相册...</div>
  </div>

  <div class="fab-btn" onclick="openPostModal('create')"><i class="fa-solid fa-plus"></i></div>

  <div class="modal-overlay" id="profile-modal">
    <div class="modal-box">
      <h3 style="margin-top: 0;">修改个人资料</h3>
      <div style="text-align: center; margin-bottom: 20px;">
        <label style="cursor: pointer;">
          <img id="edit-avatar-preview" src="" style="width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 1px solid #eee;">
          <input type="file" accept="image/*" style="display: none;" id="avatar-upload">
          <div style="font-size: 12px; color: #666; margin-top: 5px;">点击更换头像</div>
        </label>
      </div>
      <input type="text" id="edit-name-input" placeholder="输入昵称">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('profile-modal')">取消</button>
        <button class="btn-save" onclick="saveProfile()">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="post-modal">
    <div class="modal-box">
      <h3 id="modal-title" style="margin-top: 0;">记录这一刻</h3>
      <input type="hidden" id="post-id">
      
      <div class="form-group">
        <textarea id="post-text" placeholder="这一刻的想法..." style="height: 100px;"></textarea>
      </div>
      
      <div class="image-upload-area" id="image-preview-area">
        <label class="add-img-btn" id="add-img-btn-label">
          <i class="fa-solid fa-plus"></i>
          <input type="file" accept="image/*" multiple style="display: none;" id="post-images-upload">
        </label>
      </div>
      
      <div class="form-group">
        <input type="text" id="post-location" placeholder="所在位置 (例如: 东京 · 涩谷)">
        <input type="datetime-local" id="post-time">
      </div>
      
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('post-modal')">取消</button>
        <button class="btn-save" onclick="savePost()">发布</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

  // 已经为你填好了专属云端钥匙
  const firebaseConfig = {
    apiKey: "AIzaSyB_e-0wi3aW2pqWOuZFeLbTe5JJ07UrIGU",
    authDomain: "mos-album.firebaseapp.com",
    projectId: "mos-album",
    storageBucket: "mos-album.firebasestorage.app",
    messagingSenderId: "194609146265",
    appId: "1:194609146265:web:62d79bc4880d7ff6f3cb08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const postsCollection = collection(db, "moments");

  // --- 基础工具库 ---
  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  };
  
  window.closeModal = (id) => document.getElementById(id).classList.remove('active');

  async function compressImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image(); img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > 800) { h = Math.round((h * 800) / w); w = 800; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.6));
        };
      };
    });
  }

  // --- 个人资料管理 ---
  let userProfile = JSON.parse(localStorage.getItem('mos_profile')) || {
    name: "Qinyi",
    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Qinyi",
    cover: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200"
  };
  let tempAvatar = userProfile.avatar;

  function renderProfile() {
    document.getElementById('display-name').textContent = userProfile.name;
    document.getElementById('display-avatar').src = userProfile.avatar;
    document.getElementById('display-cover').style.backgroundImage = `url('${userProfile.cover}')`;
  }
  renderProfile();

  window.openProfileModal = () => {
    document.getElementById('edit-name-input').value = userProfile.name;
    document.getElementById('edit-avatar-preview').src = userProfile.avatar;
    tempAvatar = userProfile.avatar;
    document.getElementById('profile-modal').classList.add('active');
  };

  document.getElementById('avatar-upload').addEventListener('change', async (e) => {
    if(e.target.files[0]) {
      tempAvatar = await compressImage(e.target.files[0]);
      document.getElementById('edit-avatar-preview').src = tempAvatar;
    }
  });

  document.getElementById('cover-upload').addEventListener('change', async (e) => {
    if(e.target.files[0]) {
      userProfile.cover = await compressImage(e.target.files[0]);
      localStorage.setItem('mos_profile', JSON.stringify(userProfile));
      renderProfile();
      showToast("封面已更新");
    }
  });

  window.saveProfile = () => {
    userProfile.name = document.getElementById('edit-name-input').value;
    userProfile.avatar = tempAvatar;
    localStorage.setItem('mos_profile', JSON.stringify(userProfile));
    renderProfile();
    closeModal('profile-modal');
  };

  // --- 云端动态管理 ---
  let currentImages = [];
  let postsList = [];

  const q = query(postsCollection, orderBy("time", "desc"));
  onSnapshot(q, (snapshot) => {
    postsList = [];
    snapshot.forEach((doc) => {
      postsList.push({ id: doc.id, ...doc.data() });
    });
    renderFeed();
  });

  function renderFeed() {
    const container = document.getElementById('feed-container');
    if (postsList.length === 0) {
      container.innerHTML = '<div style="text-align: center; color: #999; margin-top: 50px;">点击右下角加号，发布第一条动态吧！</div>';
      return;
    }
    
    container.innerHTML = '';
    postsList.forEach(post => {
      let grid = 'grid-9'; 
      if (post.images.length === 1) grid = 'grid-1'; 
      else if ([2, 4].includes(post.images.length)) grid = 'grid-4';
      
      const timeStr = new Date(post.time).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      // 在这里加上了修改和删除两个按钮
      container.innerHTML += `
        <div class="post">
          <img class="avatar" src="${post.authorAvatar}">
          <div class="post-body">
            <div class="author-name">${post.authorName}</div>
            <div class="post-text">${post.text}</div>
            ${post.images && post.images.length ? `<div class="img-grid ${grid}">${post.images.map(img => `<img src="${img}">`).join('')}</div>` : ''}
            ${post.location ? `<div class="location-tag">${post.location}</div>` : ''}
            <div class="meta-info">
              <span>${timeStr}</span>
              <div class="action-btns">
                <button class="action-btn btn-edit" onclick="openPostModal('edit', '${post.id}')">修改</button>
                <button class="action-btn btn-delete" onclick="deletePost('${post.id}')">删除</button>
              </div>
            </div>
          </div>
        </div>`;
    });
  }

  function updateImagePreviews() {
    const area = document.getElementById('image-preview-area');
    area.querySelectorAll('.preview-img-box').forEach(el => el.remove());
    currentImages.forEach((img, i) => {
      const box = document.createElement('div'); box.className = 'preview-img-box';
      box.innerHTML = `<img src="${img}"><div class="remove-img" onclick="removeImage(${i})">X</div>`;
      area.insertBefore(box, document.getElementById('add-img-btn-label'));
    });
  }
  
  window.removeImage = (index) => { currentImages.splice(index, 1); updateImagePreviews(); };

  document.getElementById('post-images-upload').addEventListener('change', async (e) => {
    for (let file of Array.from(e.target.files).slice(0, 9 - currentImages.length)) {
      currentImages.push(await compressImage(file));
    }
    updateImagePreviews();
  });

  window.openPostModal = (mode, id = null) => {
    const modal = document.getElementById('post-modal');
    modal.classList.add('active');
    
    if (mode === 'create') {
      document.getElementById('modal-title').textContent = '记录这一刻';
      document.getElementById('post-id').value = '';
      document.getElementById('post-text').value = '';
      document.getElementById('post-location').value = '';
      
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('post-time').value = now.toISOString().slice(0, 16);
      currentImages = [];
    } else {
      document.getElementById('modal-title').textContent = '修改动态';
      const post = postsList.find(p => p.id === id);
      document.getElementById('post-id').value = post.id;
      document.getElementById('post-text').value = post.text;
      document.getElementById('post-location').value = post.location;
      document.getElementById('post-time').value = post.time;
      currentImages = post.images ? [...post.images] : [];
    }
    updateImagePreviews();
  };

  window.savePost = async () => {
    const id = document.getElementById('post-id').value;
    const postData = {
      text: document.getElementById('post-text').value,
      location: document.getElementById('post-location').value,
      time: document.getElementById('post-time').value,
      images: currentImages,
      authorName: userProfile.name,
      authorAvatar: userProfile.avatar
    };

    try {
      if (id) {
        const postRef = doc(db, "moments", id);
        await updateDoc(postRef, postData);
        showToast("修改已同步至云端");
      } else {
        await addDoc(postsCollection, postData);
        showToast("发布成功");
      }
      closeModal('post-modal');
    } catch (e) {
      console.error(e);
      showToast("保存失败，请检查网络");
    }
  };

  // 完整的删除功能在这里
  window.deletePost = async (id) => {
    if(confirm("确定要删除这条动态吗？删除后不可恢复。")) {
      try {
        await deleteDoc(doc(db, "moments", id));
        showToast("动态已删除");
      } catch (e) {
        console.error(e);
        showToast("删除失败，请稍后再试");
      }
    }
  };
</script>
</body>
</html>
